# service.yaml — creates a stable internal endpoint so other resources can reach your pods
# pods come and go (restart, scale) but the Service IP stays fixed

apiVersion: v1       # API version for core Kubernetes resources
kind: Service        # type of Kubernetes resource we are creating

metadata:
  name: {{ .Release.Name }}       # service name (same as release name for clarity)
  namespace: {{ .Values.namespace }}  # must be in the same namespace as the pods

spec:
  type: {{ .Values.service.type }}
  # ClusterIP = only accessible inside the cluster (not from internet)
  # NodePort   = accessible from outside via a port on the node
  # LoadBalancer = creates a cloud load balancer (AWS/GCP)

  selector:
    app: {{ .Release.Name }}
  # finds pods with this label and routes traffic to them
  # this is how Service knows WHICH pods to send traffic to

  ports:
    - port: {{ .Values.service.port }}  # port the Service listens on (80)
      targetPort: 80                    # port on the pod to forward traffic to
                                        # must match containerPort in deployment.yaml